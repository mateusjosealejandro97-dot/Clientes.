<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ahorro y Metas - Firebase</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #10b981; /* Verde esmeralda para finanzas */
            --primary-hover: #059669;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #cbd5e1;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { margin-bottom: 5px; color: var(--primary); }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 1fr; }
            .full-width { grid-column: span 2; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }

        .metric-box {
            text-align: center;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px dashed var(--border);
        }
        #progreso-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 5px;
        }

        .table-wrapper {
            max-height: 300px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        th { background: #f8fafc; position: sticky; top: 0; }

        .action-btn {
            background: none;
            color: var(--danger);
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 5px;
        }
        .action-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mi Hucha Digital (Cloud)</h1>
        <p>Gestiona tus ahorros diarios y mide tu nivel de cumplimiento</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>1. Tu Meta de Ahorro</h2>
            <div class="form-group">
                <label for="meta">Meta Total ($):</label>
                <input type="number" id="meta" placeholder="Ej. 500" step="1">
            </div>
            <button id="btn-guardar-meta">Fijar Meta Financiera</button>

            <div class="metric-box">
                <div>Progreso total alcanzado:</div>
                <h3 id="progreso-valor" style="margin: 5px 0 0 0;">--</h3>
                <span id="progreso-badge">Sin datos</span>
            </div>
        </div>

        <div class="card">
            <h2>2. Registrar Depósito Diario</h2>
            <div class="form-group">
                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label for="ahorro">Cantidad aportada ($):</label>
                <input type="number" id="ahorro" placeholder="Ej. 15.50" step="0.01">
            </div>
            <button id="btn-add-registro">Añadir Ahorro</button>
        </div>

        <div class="card full-width">
            <h2>Evolución del Fondo de Ahorro ($)</h2>
            <div style="position: relative; height:300px; width:100%">
                <canvas id="graficaAhorro"></canvas>
            </div>
        </div>

        <div class="card full-width">
            <h2>Historial de Depósitos</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Ahorrado Hoy ($)</th>
                            <th>% Cubierto de la Meta</th>
                            <th style="text-align: center;">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        doc, 
        deleteDoc, 
        query, 
        orderBy, 
        onSnapshot, 
        setDoc, 
        getDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Usamos tus credenciales de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCMopU1uX95RCA62cT3_RSh9rdTOxjIM7E",
        authDomain: "clientes-5a491.firebaseapp.com",
        projectId: "clientes-5a491",
        storageBucket: "clientes-5a491.firebasestorage.app",
        messagingSenderId: "896297689708",
        appId: "1:896297689708:web:b61d4e6438f9d542cd2e49",
        measurementId: "G-L75DTF62LX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let historial = [];
    let metaConfigurada = 0;
    let miGrafica;

    const inputMeta = document.getElementById('meta');
    const inputFecha = document.getElementById('fecha');
    const inputAhorro = document.getElementById('ahorro');
    const tablaCuerpo = document.getElementById('tabla-cuerpo');
    const progresoValor = document.getElementById('progreso-valor');
    const progresoBadge = document.getElementById('progreso-badge');

    window.addEventListener('DOMContentLoaded', async () => {
        const hoy = new Date().toISOString().split('T')[0];
        inputFecha.value = hoy;

        inicializarGrafica();
        await cargarMeta();
        escucharAhorros();
    });

    // Guardar Meta en la nube (coleccion: 'finanzas_config')
    document.getElementById('btn-guardar-meta').addEventListener('click', async () => {
        const met = parseFloat(inputMeta.value);
        if(met > 0) {
            try {
                await setDoc(doc(db, "finanzas_config", "ahorro_meta"), { meta: met });
                metaConfigurada = met;
                alert('Meta financiera actualizada en la nube.');
                renderizarTodo();
            } catch (error) {
                console.error("Error al guardar meta: ", error);
            }
        } else {
            alert('Por favor, introduce una meta válida.');
        }
    });

    async function cargarMeta() {
        const docRef = doc(db, "finanzas_config", "ahorro_meta");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            metaConfigurada = docSnap.data().meta;
            inputMeta.value = metaConfigurada;
        }
    }

    // Registrar depósito diario (coleccion: 'historial_ahorro')
    document.getElementById('btn-add-registro').addEventListener('click', async () => {
        const fechaVal = inputFecha.value;
        const ahorroVal = parseFloat(inputAhorro.value);

        if(!fechaVal || isNaN(ahorroVal) || ahorroVal <= 0) {
            alert('Por favor ingresa un monto válido.');
            return;
        }

        try {
            await addDoc(collection(db, "historial_ahorro"), {
                fecha: fechaVal,
                cantidad: ahorroVal
            });
            inputAhorro.value = '';
        } catch (error) {
            console.error("Error al añadir ahorro: ", error);
        }
    });

    function escucharAhorros() {
        const q = query(collection(db, "historial_ahorro"), orderBy("fecha", "asc"));
        
        onSnapshot(q, (querySnapshot) => {
            historial = [];
            querySnapshot.forEach((doc) => {
                historial.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            renderizarTodo();
        });
    }

    window.borrarRegistro = async function(id) {
        if(confirm('¿Deseas eliminar este registro de ahorro?')) {
            try {
                await deleteDoc(doc(db, "historial_ahorro", id));
            } catch (error) {
                console.error("Error al eliminar ahorro: ", error);
            }
        }
    }

    // Calcula el porcentaje acumulado respecto a la meta configurada
    function calcularPorcentaje(cantidad, meta) {
        if(!meta) return null;
        return ((cantidad / meta) * 100).toFixed(1);
    }

    // Clasifica visualmente el estado del progreso global
    function clasificarProgreso(porcentaje) {
        const num = parseFloat(porcentaje);
        if(num < 25) return { texto: 'Empezando', color: '#64748b' };
        if(num < 75) return { texto: 'Buen ritmo', color: '#3b82f6' };
        if(num < 100) return { texto: '¡Casi lo logras!', color: '#f59e0b' };
        return { texto: '¡Meta Cumplida! 🎉', color: '#10b981' };
    }

    function renderizarTodo() {
        tablaCuerpo.innerHTML = '';
        let acumuladoTotal = 0;
        
        historial.forEach(item => {
            acumuladoTotal += item.cantidad; // El ahorro va sumando día a día
            const porcentaje = calcularPorcentaje(acumuladoTotal, metaConfigurada);
            const porcentajeTexto = porcentaje ? `${porcentaje}%` : '--';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.fecha}</td>
                <td><strong>$${item.cantidad.toFixed(2)}</strong></td>
                <td>${porcentajeTexto}</td>
                <td style="text-align: center;">
                    <button class="action-btn" onclick="borrarRegistro('${item.id}')">Borrar</button>
                </td>
            `;
            tablaCuerpo.appendChild(tr);
        });

        // Actualizar tarjeta superior con el acumulado total actual
        if(metaConfigurada > 0) {
            const porcentajeGlobal = calcularPorcentaje(acumuladoTotal, metaConfigurada);
            const clasificacion = clasificarProgreso(porcentajeGlobal);

            progresoValor.innerText = `$${acumuladoTotal.toFixed(2)} / $${metaConfigurada}`;
            progresoBadge.innerText = clasificacion.texto;
            progresoBadge.style.backgroundColor = clasificacion.color;
            progresoBadge.style.color = '#ffffff';
        } else {
            progresoValor.innerText = `--`;
            progresoBadge.innerText = 'Define tu meta';
            progresoBadge.style.backgroundColor = '#64748b';
        }

        actualizarGrafica();
    }

    function inicializarGrafica() {
        const ctx = document.getElementById('graficaAhorro').getContext('2d');
        miGrafica = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Fondo Total Acumulado ($)',
                    data: [],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 3,
                    tension: 0.2,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { display: false } },
                    y: { ticks: { stepSize: 10 } }
                }
            }
        });
    }

    function actualizarGrafica() {
        const fechas = historial.map(item => item.fecha);
        
        // Muestra de manera lineal el progreso acumulativo
        let suma = 0;
        const montosAcumulados = historial.map(item => {
            suma += item.cantidad;
            return suma;
        });

        miGrafica.data.labels = fechas;
        miGrafica.data.datasets[0].data = montosAcumulados;
        miGrafica.update();
    }
</script>

</body>
</html>
